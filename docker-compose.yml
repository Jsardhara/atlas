version: "3.9"

networks:
  atlas_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  atlas_userdata:

x-agent-base: &agent-base
  build:
    context: ./agents
    dockerfile: shared/Dockerfile
  env_file: .env
  networks:
    - atlas_network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - atlas_userdata:/freqtrade/user_data
    - /var/run/docker.sock:/var/run/docker.sock

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - atlas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - atlas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Freqtrade Engine (existing bot, imported into atlas network)
  # ---------------------------------------------------------------------------
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    volumes:
      - atlas_userdata:/freqtrade/user_data
      - ../crypto-bot/user_data/config.json:/freqtrade/user_data/config.json:ro
      - ../crypto-bot/user_data/strategies:/freqtrade/user_data/strategies
    env_file: .env
    environment:
      - KRAKEN_API_KEY=${KRAKEN_API_KEY}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET}
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy FreqAISelfImprove
    networks:
      - atlas_network
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agents (all run in parallel)
  # ---------------------------------------------------------------------------
  agent-commander:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: commander/Dockerfile
    command: python -m commander.agent
    container_name: atlas-commander

  agent-oracle:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: oracle/Dockerfile
    command: python -m oracle.agent
    container_name: atlas-oracle

  agent-guardian:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: guardian/Dockerfile
    command: python -m guardian.agent
    container_name: atlas-guardian

  agent-trader:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: trader/Dockerfile
    command: python -m trader.agent
    container_name: atlas-trader

  agent-sage:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: sage/Dockerfile
    command: python -m sage.agent
    container_name: atlas-sage

  agent-architect:
    <<: *agent-base
    build:
      context: ./agents
      dockerfile: architect/Dockerfile
    command: python -m architect.agent
    container_name: atlas-architect

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - atlas_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Next.js Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=${ATLAS_PUBLIC_URL}/api
      - NEXT_PUBLIC_WS_URL=ws://api:8000/ws
    networks:
      - atlas_network
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - atlas_network
    depends_on:
      - api
      - dashboard
    ports:
      - "0.0.0.0:80:80"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel (remote access — set CF_TUNNEL_TOKEN to enable)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - atlas_network
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - remote
